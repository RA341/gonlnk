syntax = "proto3";

package library.v1;

option go_package = "github.com/ra341/gonlnk/generated/library/v1";

service LibraryService {
  rpc Add(AddRequest) returns (AddResponse) {}
  rpc List(ListRequest) returns (ListResponse) {}
  rpc Retry(RetryRequest) returns (RetryResponse) {}
}

message RetryRequest {
  Link link = 1;
}

message RetryResponse {}

message ListRequest {}

message ListResponse {
  repeated Link links = 1;
}

message Link {
    int64 id = 6;
    string Title = 1;
    string Url = 2;
    string DownloadPath = 3;
    string Status = 4;
    string Err = 5;
}

message AddRequest {
    repeated string link = 1;
}

message AddResponse {}
